<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>UEIT Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>


<body>

<!-- NAVBAR -->

<nav>

<h2>UEIT Dashboard</h2>

<div>
<a href="dashboard.html">Dashboard</a>
<a href="emergency.html">Emergency</a>
<a href="safety.html">Safety Guide</a>
<a href="admin.html">Admin</a>
</div>

</nav>


<!-- DASHBOARD -->

<section class="dashboard">

<!-- EMERGENCY TYPE -->

<div class="card">

<h3>Emergency Type</h3>

<select id="emergencyType">

<option>Medical</option>
<option>Accident</option>
<option>Theft</option>
<option>Lost Passport</option>

</select>

<button onclick="analyzeEmergency()">
Analyze
</button>

<p id="analysisResult"></p>

</div>



<!-- STAR RATING -->

<div class="card">

<h3>Rate Helpfulness</h3>

<div class="stars">

<span onclick="rate(1)">⭐</span>
<span onclick="rate(2)">⭐</span>
<span onclick="rate(3)">⭐</span>
<span onclick="rate(4)">⭐</span>
<span onclick="rate(5)">⭐</span>

</div>

<p id="ratingResult"></p>

</div>



<!-- TRENDING -->

<div class="card">

<h3>Trending Emergencies</h3>

<ul>

<li>Theft</li>
<li>Medical</li>
<li>Accident</li>

</ul>

</div>



<!-- CONTACTS -->

<div class="card">

<h3>Emergency Contacts</h3>

<p>Add trusted contacts.</p>

<input type="text" id="contactName" placeholder="Contact Name">

<input type="tel" id="contactPhone" placeholder="Phone Number">

<button onclick="saveContact()">
Add Contact
</button>

<p id="contactSaved"></p>

</div>



<!-- HOSPITALS -->

<div class="card">

<h3>Nearby Hospitals</h3>

<p>Locate hospitals nearby.</p>

<button onclick="findHospitals()">
Locate
</button>

</div>



<!-- ALERTS -->

<div class="card">

<h3>Safety Alerts</h3>

<p>Latest tourist warnings.</p>

<button onclick="showAlert()">
View Alerts
</button>

</div>

</section>



<script src="js/app.js"></script>
<script src="js/ratings.js"></script>

</body>

</html>
